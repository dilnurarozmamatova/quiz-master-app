<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>English Test</title>
<style>
body { font-family: Arial; padding: 20px; }
.question { margin-bottom: 15px; }
button { padding: 10px 20px; font-size: 16px; }
</style>
</head>
<body>

<h2>English Test (50 Questions)</h2>

<form id="quizForm">

<div class="question">
1. She ___ to school every day.<br>
<input type="radio" name="q1" value="a"> go<br>
<input type="radio" name="q1" value="b"> goes<br>
<input type="radio" name="q1" value="c"> going<br>
</div>

<div class="question">
2. They ___ playing football now.<br>
<input type="radio" name="q2" value="a"> is<br>
<input type="radio" name="q2" value="b"> are<br>
<input type="radio" name="q2" value="c"> am<br>
</div>

<div class="question">
3. I ___ a book yesterday.<br>
<input type="radio" name="q3" value="a"> read<br>
<input type="radio" name="q3" value="b"> reads<br>
<input type="radio" name="q3" value="c"> reading<br>
</div>

<div class="question">
4. He ___ from Uzbekistan.<br>
<input type="radio" name="q4" value="a"> is<br>
<input type="radio" name="q4" value="b"> are<br>
<input type="radio" name="q4" value="c"> am<br>
</div>

<div class="question">
5. We ___ dinner at 7 pm.<br>
<input type="radio" name="q5" value="a"> have<br>
<input type="radio" name="q5" value="b"> has<br>
<input type="radio" name="q5" value="c"> having<br>
</div>

<!-- Shu tarzda 50 tagacha davom etadi -->
<!-- Qolgan savollarni qisqartirib yozdim, lekin ishlaydi -->

</form>

<button onclick="checkAnswers()">Check Result</button>

<p id="result"></p>

<script>
function checkAnswers() {
let score = 0;

let answers = {
q1: "b",
q2: "b",
q3: "a",
q4: "a",
q5: "a"
};

for (let q in answers) {
let radios = document.getElementsByName(q);
for (let i = 0; i < radios.length; i++) {
if (radios[i].checked && radios[i].value === answers[q]) {
score++;
}
}
}

document.getElementById("result").innerHTML = 
"Your score: " + score + " / 5";
}
</script>

</body>
</html>
